# 负载均衡站点配置 (HTTP)
# 适用于多后端服务器的高可用架构

# 定义上游服务器组
upstream 应用服务器组 {
    least_conn;
    server 192.168.1.10:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 192.168.1.11:8080 weight=5 max_fails=3 fail_timeout=30s;
    server 192.168.1.12:8080 backup;
    keepalive 32;
}

upstream API服务器组 {
    server 192.168.1.20:3000;
    server 192.168.1.21:3000;
    server 192.168.1.22:3000;
}

# HTTP 服务器
server {
    listen 80;
    listen [::]:80;
    server_name lb.example.com;

    # 引入通用安全头
    include /etc/nginx/配置片段/通用安全头.conf;

    # 引入禁止访问配置
    include /etc/nginx/配置片段/禁止访问.conf;

    # 引入错误页面配置
    include /etc/nginx/配置片段/错误页面.conf;

    # 日志配置
    access_log /var/log/nginx/lb.example.com.access.log 详细日志格式;
    error_log /var/log/nginx/lb.example.com.error.log;

    # 引入速率限制配置（负载均衡专用）
    include /etc/nginx/配置片段/速率限制-负载均衡.conf;

    # 主应用负载均衡
    location / {
        proxy_pass http://应用服务器组;
        include /etc/nginx/配置片段/通用代理.conf;

        # 额外的负载均衡优化
        proxy_set_header Connection "";
    }

    # API 负载均衡
    location /api/ {
        proxy_pass http://API服务器组/;
        include /etc/nginx/配置片段/通用代理.conf;
    }

    # 健康检查端点（需要 nginx_upstream_check_module）
    # location /status {
    #     check_status;
    # }

    # 引入静态文件缓存配置
    include /etc/nginx/配置片段/静态文件缓存.conf;
}
