# 纯静态资源站点配置 (HTTP)
# 适用于 CDN 源站或纯静态网站

server {
    listen 80;
    listen [::]:80;
    server_name static.example.com;

    root /var/www/static-example;
    index index.html;
    charset utf-8;

    include /etc/nginx/配置片段/通用安全头.conf;
    include /etc/nginx/配置片段/禁止访问.conf;
    include /etc/nginx/配置片段/错误页面.conf;
    include /etc/nginx/配置片段/静态文件缓存.conf;
    include /etc/nginx/配置片段/Gzip压缩.conf;

    # 引入速率限制配置（静态站点专用）
    include /etc/nginx/配置片段/速率限制-静态站点.conf;
}
