user root;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 请求体大小限制（防止 DoS 攻击）
    client_max_body_size 10m;

    # 引入配置片段（只包含 http 块级别的配置）
    include /etc/nginx/配置片段/日志格式.conf;
    include /etc/nginx/配置片段/速率限制.conf;
    include /etc/nginx/配置片段/性能优化.conf;
    include /etc/nginx/配置片段/负载均衡配置.conf;
    include /etc/nginx/配置片段/Gzip压缩.conf;

    access_log /var/log/nginx/access.log 主日志格式;

    # 运行中的站点（软链接到可用站点）
    include /etc/nginx/运行站点/*;

    # 暂停的站点（保留配置但不生效）
    # include /etc/nginx/暂停站点/*;
}
