# 默认站点配置
# 当请求不匹配任何已配置站点时使用

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/html;
    index index.php index.html index.htm;

    # 站点日志配置（默认站点使用固定名称）
    access_log /etc/nginx/日志/访问日志/default.access.log 主日志格式;
    error_log /etc/nginx/日志/错误日志/default.error.log warn;

    # 引入通用安全头
    include /etc/nginx/配置片段/通用安全头.conf;

    # 引入禁止访问配置
    include /etc/nginx/配置片段/禁止访问.conf;

    # 引入错误页面配置
    include /etc/nginx/配置片段/错误页面.conf;

    # 引入静态文件缓存配置
    include /etc/nginx/配置片段/静态文件缓存.conf;

    # 引入 PHP 支持（如果 PHP-FPM 已安装并运行）
    include /etc/nginx/配置片段/PHP8.4支持.conf;


    location / {
          try_files $uri $uri/ =404;
        include /etc/nginx/配置片段/CORS跨域支持.conf;
        include /etc/nginx/配置片段/迅睿CMS伪静态和安全优化.conf;
    }

}
