# 通用错误页面配置
# 错误页面目录: /var/www/error-html

# 400 错误请求 - 请求参数错误或格式不正确
error_page 400 /400_错误请求.html;
location = /400_错误请求.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}

# 401 未授权 - 需要提供身份验证凭据
error_page 401 /401_未授权.html;
location = /401_未授权.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}

# 403 禁止访问 - 没有权限访问此资源
error_page 403 /403_禁止访问.html;
location = /403_禁止访问.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}

# 404 资源未找到 - 请求的资源不存在或已被删除
error_page 404 /404_资源未找到.html;
location = /404_资源未找到.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}

# 500 服务器错误 - 服务器内部错误
error_page 500 /500_服务器错误.html;
location = /500_服务器错误.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}

# 502 错误网关 - 网关或代理收到无效响应
error_page 502 /502_错误网关.html;
location = /502_错误网关.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}

# 503 服务不可用 - 服务器暂时无法处理请求
error_page 503 /503_服务不可用.html;
location = /503_服务不可用.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}

# 504 网关超时 - 网关或代理未能及时获得响应
error_page 504 /504_网关超时.html;
location = /504_网关超时.html {
    internal;
    root /var/www/error-html;
    add_header Access-Control-Allow-Origin '*' always;
}
