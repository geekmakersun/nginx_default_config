# 速率限制配置
# 用于防止暴力破解和 DDoS 攻击

# 定义请求限制区域
# 基于 IP 地址限制，内存区域大小为 10MB
# 每秒允许 10 个请求，突发允许 20 个请求
limit_req_zone $binary_remote_addr zone=通用限制:10m rate=10r/s;

# 登录接口限制（更严格）
# 每分钟允许 5 个请求，防止暴力破解
limit_req_zone $binary_remote_addr zone=登录限制:10m rate=5r/m;

# API 接口限制
# 每秒允许 20 个请求
limit_req_zone $binary_remote_addr zone=API限制:10m rate=20r/s;

# 应用速率限制（在 location 块中使用）
# 示例：
# limit_req zone=通用限制 burst=20 nodelay;
# limit_req zone=登录限制 burst=5 nodelay;
# limit_req zone=API限制 burst=40 nodelay;

# 连接数限制（防止连接耗尽攻击）
limit_conn_zone $binary_remote_addr zone=连接限制:10m;

# 应用连接限制（在 location 块中使用）
# 示例：
# limit_conn 连接限制 10;

# 限制响应速率（防止慢速攻击）
limit_rate_after 1m;
limit_rate 100k;
