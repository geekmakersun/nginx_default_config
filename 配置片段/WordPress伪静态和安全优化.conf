# 迅睿CMS (XunRui CMS) 伪静态规则和安全优化配置
# 包含：内容管理、会员中心、安全防护等功能
# 注意：本配置需要配合 PHP8.4支持.conf 使用

# ============================================
# 第一部分：伪静态规则（官方标准配置）
# ============================================

# 迅睿CMS 主 location 配置
# 使用官方推荐的 if + rewrite 模式，确保伪静态检测通过
location / {
    include /etc/nginx/配置片段/速率限制-PHP站点.conf;
    # 文件存在则直接访问
    if (-f $request_filename) {
        expires 30d;
        break;
    }
    
    # 目录存在则直接访问
    if (-d $request_filename) {
        break;
    }
    
    # 文件/目录不存在时，重写至 index.php
    if (!-e $request_filename) {
        rewrite ^/(.*)$ /index.php?s=$1 last;
    }
}

# ============================================
# 第二部分：安全优化配置
# ============================================

# 保护迅睿CMS配置文件
location = /config.php {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /config/ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /cache/ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /data/ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /runtime/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护数据库备份目录
location ~* /backup/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护安装目录（安装完成后应删除）
location ~* /install/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护更新目录
location ~* /update/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护日志目录
location ~* /logs?/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护临时文件
location ~* /temp/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问上传目录中的可执行文件
location ~* /uploadfile/.*\.(php|php5|php7|php8|phtml|phps|phar|exe|sh|bat|cmd)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问模板目录中的 PHP 文件
location ~* /template/.*\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问核心框架文件
location ~* /dayrui/.*\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护 .env 环境配置文件
location ~* /\.env {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护 composer 相关文件
location ~* /composer\.(json|lock)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护备份文件
location ~* \.(zip|tar|gz|tar\.gz|sql|bak|backup|old|orig|save|swp|swo)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对敏感文件的访问
location ~* /(README|CHANGELOG|LICENSE|INSTALL|UPGRADE|SECURITY)\.txt$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对 .htaccess 的访问
location ~* /\.ht {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对版本控制目录的访问
location ~* /\.(git|svn|hg)/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止 User-Agent 为空的请求
if ($http_user_agent ~* "^$") {
    return 403;
}

# 阻止常见的恶意爬虫
if ($http_user_agent ~* (wget|curl|libwww-perl|python-requests|scrapy|bot|spider|crawler)) {
    return 403;
}
