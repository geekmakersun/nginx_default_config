# WordPress 伪静态规则和安全优化配置
# 包含：固定链接支持、多站点、REST API、安全防护等功能

# ============================================
# 第一部分：伪静态规则
# ============================================

# WordPress 主 location 配置
location / {
    try_files $uri $uri/ /index.php?$args;
    # 引入速率限制配置（PHP 站点专用）
    include /etc/nginx/配置片段/速率限制-PHP站点.conf;
}

# WordPress 重写规则 - 支持 /blog/ 前缀
location /blog/ {
    try_files $uri $uri/ /blog/index.php?$args;
}

# WordPress 多站点子目录模式支持
if (!-e $request_filename) {
    rewrite /wp-admin$ $scheme://$host$uri/ permanent;
    rewrite ^(/[^/]+)?(/wp-.*) $2 last;
    rewrite ^(/[^/]+)?(/.*\.php) $2 last;
}

# WordPress REST API 支持
location ~ ^/wp-json/ {
    rewrite ^/wp-json/(.*?)$ /index.php?rest_route=/$1 last;
}

# WordPress 站点地图支持
location ~* /sitemap\.xml$ {
    try_files $uri $uri/ /index.php?$args;
}

location ~* /sitemap_index\.xml$ {
    try_files $uri $uri/ /index.php?$args;
}

# WordPress robots.txt 支持
location = /robots.txt {
    try_files $uri $uri/ /index.php?$args;
}

# ============================================
# 第二部分：安全优化配置
# ============================================

# 保护 WordPress 配置文件
location = /wp-config.php {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护 wp-admin 目录下的敏感文件
location ~* /wp-admin/(install|upgrade|network)\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止直接访问 wp-includes 目录
location ~* /wp-includes/.*\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问 wp-content/uploads 下的可执行文件
location ~* /(?:uploads|files)/.*\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护 WordPress 备份文件
location ~* \.(zip|tar|gz|tar\.gz|sql|bak|backup|old|orig|save)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对 xmlrpc.php 的访问（如果不需要）
# 如需使用 Jetpack 或移动应用，请注释掉此段
location = /xmlrpc.php {
    # 可选：限制特定 IP 访问
    # allow 1.2.3.4;
    # deny all;
    
    # 或完全禁止
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对 wp-trackback.php 的访问
location = /wp-trackback.php {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止用户枚举攻击
if ($args ~* "^author=([0-9]+)$") {
    return 403;
}

# 阻止常见的恶意请求模式
location ~* "(eval\(|base64_decode|gzinflate|str_rot13|exec\(|shell_exec\(|passthru\(|system\(|proc_open\(|popen\(|curl_exec\(|curl_multi_exec\(|parse_ini_file\(|show_source)" {
    deny all;
    access_log off;
}

# 限制对 wp-login.php 的访问频率
location = /wp-login.php {
    limit_req zone=登录限制 burst=5 nodelay;
    limit_conn addr 10;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

# 限制对 wp-admin 的访问（可选，可添加 IP 白名单）
# location ~* /wp-admin/(.*) {
#     allow 127.0.0.1;
#     allow 192.168.1.0/24;
#     deny all;
#     try_files $uri $uri/ /index.php?$args;
# }

# 阻止对 .htaccess 的访问
location ~* /\.ht {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对 WordPress 缓存文件的直接访问
location ~* /wp-content/cache/.*$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对插件目录中可执行文件的访问
location ~* /wp-content/plugins/.*\.(php|php\..*)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对主题目录中可执行文件的访问
location ~* /wp-content/themes/.*\.(php|php\..*)$ {
    deny all;
    access_log off;
    log_not_found off;
}
