# 审计日志配置
# 记录敏感操作（登录、支付、数据修改等）

# 定义审计日志格式
log_format 审计日志格式 '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status "$http_referer" "$http_user_agent" '
                        'Cookie:"$http_cookie" Body:"$request_body"';

# 审计日志（需要配合 client_body_in_file_only 等指令使用）
access_log /etc/nginx/日志/审计日志/$server_name.audit.log 审计日志格式;
