# 禁止访问敏感文件和目录

# 禁止访问隐藏文件（以点开头的文件）
location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问版本控制目录
location ~* /\.(git|svn|hg)/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问敏感文件
location ~* \.(env|config|ini|log|sh|sql|bak|backup|swp|swo)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问 htaccess
location ~ /\.ht {
    deny all;
    access_log off;
    log_not_found off;
}
