# 速率限制通用规则
# 被各站点类型配置文件引用，避免重复定义

# ============================================
# 通用 Location 规则（按严格程度分类）
# ============================================

# 宽松限制 - 适合静态资源、首页
# burst: 50, 连接数: 20
# 使用方式: include /etc/nginx/配置片段/速率限制-通用规则.conf; 宽松限制

# 标准限制 - 适合普通页面
# burst: 30, 连接数: 15
# 使用方式: include /etc/nginx/配置片段/速率限制-通用规则.conf; 标准限制

# 中等限制 - 适合搜索、上传等
# burst: 10, 连接数: 5
# 使用方式: include /etc/nginx/配置片段/速率限制-通用规则.conf; 中等限制

# 严格限制 - 适合登录、后台等敏感接口
# burst: 3, 连接数: 3
# 使用方式: include /etc/nginx/配置片段/速率限制-通用规则.conf; 严格限制

# ============================================
# 具体规则定义
# ============================================

# 静态文件类型匹配
location ~* \.(html|htm|css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|otf|webp|json|xml)$ {
    limit_req zone=通用限制 burst=50 nodelay;
    limit_conn 连接限制 20;
}

# API 接口 - 高并发
location /api/ {
    limit_req zone=API限制 burst=50 nodelay;
    limit_conn 连接限制 20;
}

# 登录认证接口 - 防暴力破解
location ~* /(login|wp-login|admin|wp-admin|user/login|auth|signin|oauth|token) {
    limit_req zone=登录限制 burst=3 nodelay;
    limit_conn 连接限制 3;
}

# 后台管理 - 严格限制
location ~* /(admin|manage|dashboard|console|backend) {
    limit_req zone=登录限制 burst=5 nodelay;
    limit_conn 连接限制 5;
}

# 搜索功能 - 中等限制
location ~* /(search|s|search\.php|query) {
    limit_req zone=通用限制 burst=10 nodelay;
    limit_conn 连接限制 5;
}

# 上传接口 - 限制频率和速度
location ~* /(upload|uploads|upload\.php|api/upload) {
    limit_req zone=通用限制 burst=5 nodelay;
    limit_conn 连接限制 3;
    limit_rate 500k;
}

# WebSocket - 长连接特殊处理
location /ws/ {
    limit_conn 连接限制 5;
}

# GraphQL 端点
location ~* /graphql {
    limit_req zone=API限制 burst=20 nodelay;
    limit_conn 连接限制 10;
}

# 健康检查 - 宽松限制
location /health {
    limit_conn 连接限制 50;
}

# XML-RPC - 严格限制（WordPress 攻击目标）
location ~* /xmlrpc\.php$ {
    limit_req zone=登录限制 burst=2 nodelay;
    deny all;
}

# PHP 文件 - 标准限制
location ~ \.php$ {
    limit_req zone=通用限制 burst=15 nodelay;
    limit_conn 连接限制 8;
}
