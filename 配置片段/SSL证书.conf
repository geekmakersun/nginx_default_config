# SSL 证书配置模板
# 根据实际需求修改路径
# 注意：此文件只配置证书路径，不包含SSL安全协议设置
# 请同时引入 SSL通用配置.conf 以启用完整SSL安全设置

# 自签名证书示例（测试用）
# ssl_certificate /etc/nginx/SSL证书/self-signed.crt;
# ssl_certificate_key /etc/nginx/SSL证书/self-signed.key;

# Let's Encrypt 证书
# ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
# ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
# ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;

# 商业证书
# ssl_certificate /etc/nginx/SSL证书/example.com.crt;
# ssl_certificate_key /etc/nginx/SSL证书/example.com.key;
