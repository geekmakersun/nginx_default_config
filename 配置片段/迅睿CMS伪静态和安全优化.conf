# 迅睿CMS (XunRui CMS) 伪静态规则和安全优化配置
# 包含：内容管理、会员中心、安全防护等功能

# ============================================
# 第一部分：伪静态规则
# ============================================

# 迅睿CMS 主 location 配置
location / {
    if (-f $request_filename) {
        break;
    }
    if ($request_filename ~* "\.(js|ico|gif|jpe?g|bmp|png|css)$") {
        break;
    }
    if (!-e $request_filename) {
        rewrite . /index.php last;
    }
    # 引入速率限制配置（PHP 站点专用）
    include /etc/nginx/配置片段/速率限制-PHP站点.conf;
}

# 迅睿CMS 后台管理入口
location ~* /admin\.php$ {
    try_files $uri =404;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

# 迅睿CMS API 接口
location ~* /api\.php$ {
    try_files $uri =404;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

# 迅睿CMS 会员中心
location ~* /member/ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 手机版
location ~* /mobile/ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 自定义路由支持
# 支持 /category/xxx.html 格式
location ~* /[a-zA-Z0-9_-]+/([0-9]+)\.html$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 支持 /show/xxx.html 内容页格式
location ~* /(show|content|article|news|product)/([0-9]+)\.html$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 搜索页面
location ~* /search/?$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 标签页面
location ~* /tag/([a-zA-Z0-9_-]+)$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 专题页面
location ~* /special/([a-zA-Z0-9_-]+)$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 全站搜索
location ~* /so/?$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 站点地图
location ~* /sitemap\.xml$ {
    try_files $uri $uri/ /index.php?$query_string;
}

location ~* /sitemap_([0-9]+)\.xml$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS RSS 订阅
location ~* /rss\.xml$ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 百度推送
location ~* /baidu_push\.php$ {
    try_files $uri =404;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

# 迅睿CMS 采集接口
location ~* /caiji/ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 支付回调
location ~* /payment/ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 第三方登录回调
location ~* /oauth/ {
    try_files $uri $uri/ /index.php?$query_string;
}

# 迅睿CMS 上传文件访问
location ~* /uploadfile/ {
    try_files $uri $uri/ =404;
    expires 30d;
    access_log off;
}

# 迅睿CMS 静态资源缓存
location ~* ^/(static|assets|public)/ {
    expires 30d;
    access_log off;
    add_header Cache-Control "public, immutable";
}

# ============================================
# 第二部分：安全优化配置
# ============================================

# 保护迅睿CMS配置文件
location = /config.php {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /config/ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /cache/ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /data/ {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* /runtime/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护数据库备份目录
location ~* /backup/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护安装目录（安装完成后应删除）
location ~* /install/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护更新目录
location ~* /update/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护日志目录
location ~* /logs?/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护临时文件
location ~* /temp/ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问上传目录中的可执行文件
location ~* /uploadfile/.*\.(php|php5|php7|php8|phtml|phps|phar|exe|sh|bat|cmd)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问模板目录中的 PHP 文件
location ~* /template/.*\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 禁止访问核心框架文件
location ~* /dayrui/.*\.php$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护 .env 环境配置文件
location ~* /\.env {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护 composer 相关文件
location ~* /composer\.(json|lock)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 保护备份文件
location ~* \.(zip|tar|gz|tar\.gz|sql|bak|backup|old|orig|save|swp|swo)$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 限制后台登录频率
location ~* /admin\.php$ {
    limit_req zone=登录限制 burst=5 nodelay;
    limit_conn addr 10;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

# 限制 API 接口访问频率
location ~* /api\.php$ {
    limit_req zone=api burst=20 nodelay;
    limit_conn addr 50;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    include fastcgi_params;
}

# 阻止常见的恶意请求模式
location ~* "(eval\(|base64_decode|gzinflate|str_rot13|exec\(|shell_exec\(|passthru\(|system\(|proc_open\(|popen\(|curl_exec\(|curl_multi_exec\(|parse_ini_file\(|show_source|file_get_contents|fopen|fwrite)" {
    deny all;
    access_log off;
}

# 阻止 SQL 注入常见模式
if ($query_string ~* "union.*select.*\(") {
    return 403;
}

if ($query_string ~* "concat.*\(") {
    return 403;
}

# 阻止对敏感文件的访问
location ~* /(README|CHANGELOG|LICENSE|INSTALL|UPGRADE|SECURITY)\.txt$ {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对 .htaccess 的访问
location ~* /\.ht {
    deny all;
    access_log off;
    log_not_found off;
}

# 阻止对版本控制目录的访问
location ~* /\.(git|svn|hg)/ {
    deny all;
    access_log off;
    log_not_found off;
}

