# 纯静态资源站点配置
# 适用于 CDN 源站或纯静态网站

server {
    listen 80;
    listen [::]:80;
    server_name static.example.com;

    include /etc/nginx/配置片段/禁止访问.conf;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name static.example.com;

    ssl_certificate /etc/nginx/SSL证书/static.example.com.crt;
    ssl_certificate_key /etc/nginx/SSL证书/static.example.com.key;
    include /etc/nginx/配置片段/SSL通用配置.conf;

    root /var/www/static-example;
    index index.html;
    charset utf-8;

    include /etc/nginx/配置片段/通用安全头.conf;
    include /etc/nginx/配置片段/禁止访问.conf;
    include /etc/nginx/配置片段/错误页面.conf;
    include /etc/nginx/配置片段/静态文件缓存.conf;
    include /etc/nginx/配置片段/Gzip压缩.conf;

    location / {
        try_files $uri $uri/ =404;
    }
}
