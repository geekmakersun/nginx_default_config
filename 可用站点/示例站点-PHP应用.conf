# PHP 应用站点配置 (HTTP)
# 适用于 WordPress、Laravel、ThinkPHP 等 PHP 应用

server {
    listen 80;
    listen [::]:80;
    server_name php.example.com;

    root /var/www/php-app;
    index index.php index.html index.htm;

    include /etc/nginx/配置片段/通用安全头.conf;
    include /etc/nginx/配置片段/禁止访问.conf;
    include /etc/nginx/配置片段/错误页面.conf;

    access_log /var/log/nginx/php.example.com.access.log 主日志格式;
    error_log /var/log/nginx/php.example.com.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        # 引入速率限制配置（PHP 站点专用）
        include /etc/nginx/配置片段/速率限制-PHP站点.conf;
    }

    # PHP 8.1 处理
    include /etc/nginx/配置片段/PHP8.1支持.conf;
    include /etc/nginx/配置片段/静态文件缓存.conf;
}
