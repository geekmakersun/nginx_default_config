# 反向代理站点配置
# 适用于前后端分离架构

# HTTP 服务器 - 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # 引入禁止访问配置
    include /etc/nginx/配置片段/禁止访问.conf;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # SSL 证书配置（需修改路径）
    ssl_certificate /etc/nginx/SSL证书/example.com.crt;
    ssl_certificate_key /etc/nginx/SSL证书/example.com.key;

    # 引入 SSL 安全配置
    include /etc/nginx/配置片段/SSL通用配置.conf;

    root /var/www/example.com;
    index index.html index.htm;

    # 引入通用安全头
    include /etc/nginx/配置片段/通用安全头.conf;

    # 引入禁止访问配置
    include /etc/nginx/配置片段/禁止访问.conf;

    # 引入错误页面配置
    include /etc/nginx/配置片段/错误页面.conf;

    # 日志配置
    access_log /var/log/nginx/example.com.access.log 主日志格式;
    error_log /var/log/nginx/example.com.error.log;

    # 主站点 - 静态文件或前端应用
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理
    location /api/ {
        proxy_pass http://localhost:8080/;
        include /etc/nginx/配置片段/通用代理.conf;
    }

    # WebSocket 支持
    location /ws/ {
        proxy_pass http://localhost:3001/;
        include /etc/nginx/配置片段/WebSocket代理.conf;
    }

    # 引入静态文件缓存配置
    include /etc/nginx/配置片段/静态文件缓存.conf;
}
