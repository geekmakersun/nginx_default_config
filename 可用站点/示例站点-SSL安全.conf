# 高安全性站点配置
# 包含完整的安全响应头和 HSTS

# HTTP 服务器
server {
    listen 80;
    listen [::]:80;
    server_name secure.example.com;

    # Let's Encrypt ACME 挑战路径
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 引入禁止访问配置
    include /etc/nginx/配置片段/禁止访问.conf;

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 服务器
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name secure.example.com;

    # SSL 证书配置
    ssl_certificate /etc/letsencrypt/live/secure.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secure.example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/secure.example.com/chain.pem;

    # 引入 SSL 安全配置
    include /etc/nginx/配置片段/SSL通用配置.conf;

    root /var/www/secure-example;
    index index.html index.htm;

    # 引入高级安全头（包含 HSTS、CSP 等）
    include /etc/nginx/配置片段/高级安全头.conf;

    # 引入禁止访问配置
    include /etc/nginx/配置片段/禁止访问.conf;

    # 引入错误页面配置
    include /etc/nginx/配置片段/错误页面.conf;

    # 日志配置
    access_log /var/log/nginx/secure.example.com.access.log 主日志格式;
    error_log /var/log/nginx/secure.example.com.error.log;

    location / {
        try_files $uri $uri/ =404;
    }

    # 引入静态文件缓存配置
    include /etc/nginx/配置片段/静态文件缓存.conf;
}
