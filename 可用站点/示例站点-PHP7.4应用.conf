# PHP 7.4 应用站点配置示例

server {
    listen 80;
    listen [::]:80;
    server_name php74.example.com;

    include /etc/nginx/配置片段/禁止访问.conf;

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name php74.example.com;

    ssl_certificate /etc/nginx/SSL证书/php74.example.com.crt;
    ssl_certificate_key /etc/nginx/SSL证书/php74.example.com.key;

    include /etc/nginx/配置片段/SSL通用配置.conf;

    root /var/www/php74-app;
    index index.php index.html index.htm;

    include /etc/nginx/配置片段/通用安全头.conf;
    include /etc/nginx/配置片段/禁止访问.conf;
    include /etc/nginx/配置片段/错误页面.conf;

    access_log /var/log/nginx/php74.example.com.access.log 主日志格式;
    error_log /var/log/nginx/php74.example.com.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 使用 PHP 7.4
    include /etc/nginx/配置片段/PHP7.4支持.conf;
    include /etc/nginx/配置片段/静态文件缓存.conf;
}
